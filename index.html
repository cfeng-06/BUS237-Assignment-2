<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Logistics Command Center</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="logo">ABC Logistics Command Center</div>
    <ul class="nav-links">
        <li><a href="index.html" class="active">Dashboard</a></li>
        <li><a href="about.html">Developer Profile</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Warehouse Dashboard</h1>

    <div class="card">
        <h2>Add / Update Inventory Item</h2>
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemQuantity" placeholder="Quantity" min="1">
        <input type="number" id="itemPrice" placeholder="Price" min="0" step="0.01">
        <button onclick="addItem()">Add / Update</button>
        <button onclick="clearInventory()" class="danger">Clear All</button>
    </div>

    <div class="card">
        <h2>Inventory Overview</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total Value</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryTable"></tbody>
        </table>
    </div>

    <div class="card summary">
        <p><strong>Total Unique Items:</strong> <span id="totalItems">0</span></p>
        <p><strong>Total Quantity:</strong> <span id="totalQuantity">0</span></p>
        <p><strong>Total Warehouse Value:</strong> $<span id="totalValue">0.00</span></p>
    </div>

    <div class="card">
        <h2>Inventory Visualization</h2>
        <button onclick="setChartType('pie')">Pie Chart</button>
        <button onclick="setChartType('bar')">Bar Chart</button>
        <canvas id="inventoryChart"></canvas>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
